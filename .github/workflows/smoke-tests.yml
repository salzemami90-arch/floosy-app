name: Smoke Tests

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile app.py config_floosy.py
          python -m py_compile models/*.py repositories/*.py services/*.py pages_floosy/*.py

      - name: Run smoke tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
